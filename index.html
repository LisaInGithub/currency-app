<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>旅行貨幣</title>
<meta name="theme-color" content="#3B8DBF">
<meta name="apple-mobile-web-app-title" content="旅行貨幣">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-512.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="scrollRoot">

  <header class="nav">
    <div class="nav-top">
      <div>
        <h1 class="nav-title">旅行貨幣</h1>
        <p class="nav-subtitle" id="navSubtitle">載入中…</p>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="切換明亮／暗黑模式">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4.2"/>
          <path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1M18.4 18.4l-2.1-2.1M7.7 7.7 5.6 5.6"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/>
        </svg>
      </button>
    </div>
    <button id="statusBadge" class="status-badge" type="button">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText">載入匯率中…</span>
    </button>
  </header>

  <div id="offlineBanner" class="banner hidden">
    目前使用<strong>離線／手動</strong>匯率，數字僅供參考
  </div>

  <main class="content">

    <div class="card-list" id="cardList"></div>

    <button class="add-currency-card" id="manageBtn" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      <span>管理貨幣</span>
    </button>

    <section class="card trend-card" id="trendCard">
      <div class="trend-head">
        <span class="section-label" id="trendLabel">匯率趨勢</span>
        <span class="trend-delta" id="trendDelta">近 14 天</span>
      </div>
      <svg class="sparkline" id="sparkline" viewBox="0 0 300 72" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="sparklineGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#F6B26B" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#F6B26B" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polyline id="sparklineFill" points="" />
        <polyline id="sparklineLine" points="" />
      </svg>
      <p class="trend-caption" id="trendCaption">正在載入近期走勢…</p>
    </section>

  </main>

  <footer class="footer">
    <p id="lastUpdated">—</p>
  </footer>

</div>

<nav class="tab-bar" id="tabBar">
  <button class="tab-btn active" type="button" data-tab="convert">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9.5h5V15h2v4.5h5V10"/></svg>
    <span>換算</span>
  </button>
  <button class="tab-btn" type="button" data-tab="manage">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14M5 12h14M5 17h9"/><circle cx="19.5" cy="17" r="1.6"/></svg>
    <span>貨幣</span>
  </button>
  <button class="tab-btn" type="button" data-tab="settings">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="3.2"/>
      <path d="M12 3.5v2.6M12 17.9v2.6M20.5 12h-2.6M6.1 12H3.5M17.7 6.3l-1.8 1.8M8.1 15.9l-1.8 1.8M17.7 17.7l-1.8-1.8M8.1 8.1 6.3 6.3"/>
    </svg>
    <span>設定</span>
  </button>
</nav>

<div class="keypad-sheet hidden" id="keypadSheet">
  <div class="keypad-sheet-head">
    <span class="keypad-sheet-label" id="keypadLabel">TWD</span>
    <button class="keypad-done" id="keypadDone" type="button">完成</button>
  </div>
  <div class="quick-amounts" id="quickAmounts"></div>
  <div class="keypad" id="keypad">
    <button type="button" class="key" data-key="7">7</button>
    <button type="button" class="key" data-key="8">8</button>
    <button type="button" class="key" data-key="9">9</button>
    <button type="button" class="key key-op" data-key="/">÷</button>
    <button type="button" class="key" data-key="4">4</button>
    <button type="button" class="key" data-key="5">5</button>
    <button type="button" class="key" data-key="6">6</button>
    <button type="button" class="key key-op" data-key="*">×</button>
    <button type="button" class="key" data-key="1">1</button>
    <button type="button" class="key" data-key="2">2</button>
    <button type="button" class="key" data-key="3">3</button>
    <button type="button" class="key key-op" data-key="-">－</button>
    <button type="button" class="key key-clear" data-key="C">C</button>
    <button type="button" class="key" data-key="0">0</button>
    <button type="button" class="key" data-key=".">.</button>
    <button type="button" class="key key-op" data-key="+">＋</button>
    <button type="button" class="key key-backspace" data-key="back" aria-label="刪除一位數">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 6h11a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H7l-5-6z"/><path d="M14 10l-4 4M10 10l4 4"/></svg>
    </button>
    <button type="button" class="key key-equals" data-key="=">＝</button>
  </div>
</div>

<div class="sheet-overlay hidden" id="manageOverlay">
  <div class="sheet" id="manageSheet" role="dialog" aria-modal="true">
    <div class="sheet-grabber"></div>
    <div class="sheet-head">
      <h2 class="sheet-title">管理貨幣</h2>
      <button class="sheet-close" id="manageClose" type="button" aria-label="關閉">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <p class="settings-hint" id="manageCount">已選 4 / 5 種貨幣，首頁會依序顯示</p>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<div class="sheet-overlay hidden" id="settingsOverlay">
  <div class="sheet" id="settingsSheet" role="dialog" aria-modal="true">
    <div class="sheet-grabber"></div>
    <div class="sheet-head">
      <h2 class="sheet-title">設定</h2>
      <button class="sheet-close" id="settingsClose" type="button" aria-label="關閉">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div class="settings-block">
      <p class="settings-hint">輸入 1 美金可兌換的各幣別金額，儲存後將以此為準（直到你按「改回即時匯率」）。</p>
      <div id="manualRows"></div>
      <div class="manual-actions">
        <button id="manualSave" class="btn btn-primary" type="button">儲存手動匯率</button>
        <button id="manualReset" class="btn btn-secondary" type="button">改回即時匯率</button>
      </div>
    </div>

    <p class="settings-footnote">旅行貨幣手帳 · 支援離線使用</p>
  </div>
</div>

<div id="installToast" class="install-toast hidden">
  <span>把「旅行貨幣」加到主畫面，離線也能開！</span>
  <div class="install-toast-actions">
    <button id="installBtn" class="btn btn-primary btn-small" type="button">加到主畫面</button>
    <button id="installDismiss" class="btn btn-secondary btn-small" type="button">關閉</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
