<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>旅行貨幣手帳</title>
<meta name="theme-color" content="#f3e9d8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Zhi+Mang+Xing&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <header class="header">
    <h1 class="title">旅行貨幣手帳</h1>
    <p class="subtitle">台幣 · 蒙圖 · 美金 · 韓元</p>
    <button id="statusBadge" class="status-badge" type="button" aria-describedby="statusDetail">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText">載入匯率中…</span>
    </button>
  </header>

  <div id="offlineBanner" class="offline-banner hidden">
    ✈️ 目前使用<strong>離線／手動</strong>匯率，數字僅供參考
  </div>

  <main class="cards" id="cards">

    <section class="card" data-currency="TWD" style="--accent:#c85c5c">
      <div class="card-icon" aria-hidden="true">🇹🇼</div>
      <div class="card-info">
        <div class="card-code">TWD</div>
        <div class="card-name">新台幣</div>
      </div>
      <input class="card-input" type="text" inputmode="decimal" autocomplete="off" placeholder="0" data-currency="TWD">
    </section>

    <section class="card" data-currency="MNT" style="--accent:#5b8ab0">
      <div class="card-icon" aria-hidden="true">🇲🇳</div>
      <div class="card-info">
        <div class="card-code">MNT</div>
        <div class="card-name">蒙圖</div>
      </div>
      <input class="card-input" type="text" inputmode="decimal" autocomplete="off" placeholder="0" data-currency="MNT">
    </section>

    <section class="card" data-currency="USD" style="--accent:#3f7a5c">
      <div class="card-icon" aria-hidden="true">🇺🇸</div>
      <div class="card-info">
        <div class="card-code">USD</div>
        <div class="card-name">美金</div>
      </div>
      <input class="card-input" type="text" inputmode="decimal" autocomplete="off" placeholder="0" data-currency="USD">
    </section>

    <section class="card" data-currency="KRW" style="--accent:#c97a4a">
      <div class="card-icon" aria-hidden="true">🇰🇷</div>
      <div class="card-info">
        <div class="card-code">KRW</div>
        <div class="card-name">韓元</div>
      </div>
      <input class="card-input" type="text" inputmode="decimal" autocomplete="off" placeholder="0" data-currency="KRW">
    </section>

  </main>

  <div class="calc-toolbar" id="calcToolbar">
    <button type="button" data-op="+">＋</button>
    <button type="button" data-op="-">－</button>
    <button type="button" data-op="*">×</button>
    <button type="button" data-op="/">÷</button>
    <button type="button" data-op="C" class="calc-clear">C</button>
    <button type="button" data-op="=" class="calc-equals">＝</button>
  </div>

  <div class="quick-amounts" id="quickAmounts"></div>

  <button id="manualToggle" class="manual-link" type="button">✏️ 手動調整匯率</button>

  <section id="manualPanel" class="manual-panel hidden">
    <p class="manual-hint">輸入 1 美金可兌換的各幣別金額，儲存後將以此為準（直到你按「改回即時匯率」）。</p>
    <div class="manual-row">
      <label for="manualTWD">1 USD = <span class="unit">TWD</span></label>
      <input id="manualTWD" type="text" inputmode="decimal" autocomplete="off">
    </div>
    <div class="manual-row">
      <label for="manualMNT">1 USD = <span class="unit">MNT</span></label>
      <input id="manualMNT" type="text" inputmode="decimal" autocomplete="off">
    </div>
    <div class="manual-row">
      <label for="manualKRW">1 USD = <span class="unit">KRW</span></label>
      <input id="manualKRW" type="text" inputmode="decimal" autocomplete="off">
    </div>
    <div class="manual-actions">
      <button id="manualSave" class="btn btn-primary" type="button">儲存手動匯率</button>
      <button id="manualReset" class="btn btn-ghost" type="button">改回即時匯率</button>
    </div>
  </section>

  <footer class="footer">
    <p id="lastUpdated">—</p>
  </footer>

</div>

<div id="installToast" class="install-toast hidden">
  <span>📌 把「旅行貨幣手帳」加到主畫面，離線也能開！</span>
  <button id="installBtn" class="btn btn-primary btn-small" type="button">加到主畫面</button>
  <button id="installDismiss" class="btn btn-ghost btn-small" type="button">關閉</button>
</div>

<script src="app.js"></script>
</body>
</html>
